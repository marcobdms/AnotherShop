name: AnotherShop

options:
  bundleIdPrefix: com.anothernpcshop
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"

targets:
  AnotherShop:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AnotherShop
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.anothernpcshop.ios
      PRODUCT_NAME: AnotherShop
      SWIFT_VERSION: "5.9"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: AnotherShop/Info.plist
      properties:
        CFBundleName: AnotherShop
        CFBundleDisplayName: Another NPC Shop
        CFBundleIdentifier: com.anothernpcshop.ios
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
